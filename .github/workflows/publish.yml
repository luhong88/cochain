name: Publish Python Package to PyPI

on:
  push:
    tags:
      - 'v*' # Triggers automatically after a tag like v0.1.0a0 is pushed

jobs:
  build-and-publish:
    name: Build and publish to PyPI
    runs-on: ubuntu-latest
    
    # Links to the GitHub environment
    environment:
      name: pypi
      url: ${{ steps.pypi-publish.outputs.release_url }}
      
    # Grants the runner permission to request the OpenID Connect token
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tool
        run: python -m pip install --upgrade pip build

      - name: Build source distribution and wheel
        run: python -m build

      - name: Publish package to PyPI
        id: pypi-publish
        uses: pypa/gh-action-pypi-publish@release/v1